name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: praetorian-inc/public-workflows/.github/workflows/go-ci.yml@135c50049eeef6e664bd7ea4aacaa33118083e30  # v2.0.10
    permissions:
      contents: read
    with:
      build-cmd-path: ./cmd/nerva
      build-binary-name: nerva
      # nerva's inline CI never ran golangci-lint; preserve that behavior here.
      # Enabling lint requires migrating .golangci.yml to v2 and fixing ~70
      # pre-existing issues in pkg/ (tracked separately).
      enable-lint: false
      # Preserve the old `go test -short` behavior so Docker-based service
      # tests (gated by testing.Short() in pkg/test/testutil.go) continue to
      # skip in CI. Dropping -short surfaces ~10 container-dependent tests.
      test-flags: -short -race -coverprofile=coverage.out -covermode=atomic
    secrets: inherit
