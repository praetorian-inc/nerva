; GNU Gatekeeper test configuration for H.323 fingerprinting validation
; Accepts unregistered calls to enable fingerprinting tests

[Gatekeeper::Main]
Name=TestGK
TimeToLive=600
CompareAliasType=0
CompareAliasCase=0

[GkStatus::Auth]
; Allow status port access for debugging
rule=allow
default=allow

[RoutedMode]
GKRouted=1
H245Routed=1
CallSignalPort=1720
; Accept unregistered calls - required for fingerprinting tests
AcceptUnregisteredCalls=1
AcceptNeighborsCalls=1
DropCallsByReleaseComplete=1
SupportNATedEndpoints=1

[Proxy]
Enable=0

[RoutingPolicy]
default=explicit,internal

[LogFile]
Filename=/var/log/gnugk/gnugk.log
