# FreeDiameter Configuration for SCTP Testing
# Minimal configuration that responds to CER with CEA

# Identity and realm
Identity = "freediameter.local";
Realm = "local";

# Diameter port configuration
Port = 3868;
SecPort = 5868;

# Use both TCP and SCTP
# No_SCTP;  # Uncomment to disable SCTP
# No_TCP;  # Uncomment to disable TCP and force SCTP only

# TLS/TCP configuration (required by FreeDiameter even for non-TLS)
TLS_Cred = "/etc/freediameter/cert.pem", "/etc/freediameter/key.pem";
TLS_CA = "/etc/freediameter/cert.pem";

# Accept all certificates for testing
TLS_old_method;
No_IPv6;

# Listen addresses (all interfaces)
ListenOn = "0.0.0.0";

# Load necessary extensions for basic Diameter support
# These provide minimal CER/CEA handling

# Extension configuration (minimal for testing)
LoadExtension = "dict_nasreq.fdx";
LoadExtension = "dict_eap.fdx";

# Debug and logging
# DebugLevel = 3;  # 0=quiet, 1=errors, 2=warnings, 3=info, 4=debug

# Peer connection configuration (optional - for connecting to other nodes)
# ConnectPeer = "peer.example.com" { ConnectTo = "192.168.1.100"; Port = 3868; };

# Allow connections from any peer (for testing)
# In production, you would configure specific peers
# For testing, we'll accept any incoming connection
